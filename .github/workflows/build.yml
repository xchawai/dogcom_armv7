name: Build dogcom for IPQ5312 (32-bit ARMhf)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: 'mchome/dogcom'

      - name: Install 32-bit ARM Toolchain
        run: |
          sudo apt-get update
          # 安装针对 32 位 ARM 的交叉编译器
          sudo apt-get install -y gcc-arm-linux-gnueabihf make

      - name: Compile
        run: |
          # 使用 arm-linux-gnueabihf-gcc 编译
          # 加上 -static 是为了解决 musl/glibc 的兼容性问题，确保在你的固件上稳跑
          make CC="arm-linux-gnueabihf-gcc -static"
          
          # 去除符号表减小体积
          arm-linux-gnueabihf-strip dogcom

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dogcom-ipq5312-armhf
          path: dogcom
          
